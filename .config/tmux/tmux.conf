# tmux baseline for persistent local and remote agent sessions.

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-option -g mouse on
set-option -g focus-events on
set-option -g escape-time 10
set-option -g history-limit 50000

set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

set-option -g status on
set-option -g status-interval 5
set-option -g status-position bottom
set-option -g status-style "bg=#101216,fg=#cbd5e1"
set-option -g message-style "bg=#334155,fg=#ffffff"
set-option -g pane-border-style "fg=#334155"
set-option -g pane-active-border-style "fg=#38bdf8"

set-window-option -g window-status-format " #I:#W "
set-window-option -g window-status-current-format " #I:#W* "
set-window-option -g window-status-current-style "bg=#1e293b,fg=#ffffff,bold"

set-option -g status-left-length 40
set-option -g status-right-length 80
set-option -g status-left " #S "
set-option -g status-right " #{pane_current_path} | %Y-%m-%d %H:%M "
